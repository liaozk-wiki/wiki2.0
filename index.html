<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 基础 SEO -->
    <title>liaozk's wiki</title>
    <meta
      name="description"
      content="liaozk 的个人知识库与笔记：阅读、计算机、学习、生活记录与文章。"
    />
    <meta
      name="keywords"
      content="liaozk,wiki,笔记,博客,阅读,计算机,学习"
    />
    <meta name="author" content="liaozk" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#f3f4f6" />

    <!-- Open Graph（分享卡片；部署后请将 og:url / og:image 改为绝对地址） -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="liaozk's wiki" />
    <meta
      property="og:description"
      content="liaozk 的个人知识库与笔记：阅读、计算机、学习、生活记录与文章。"
    />
    <meta property="og:locale" content="zh_CN" />
    <!-- 示例：GitHub Pages 项目站请改成你的仓库地址；用户站常为 https://<user>.github.io/ -->
    <meta property="og:url" content="https://liaozk.wiki/" />
    <meta
      property="og:image"
      content="https://liaozk.wiki/liaozkwechat.jpg"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="liaozk's wiki" />
    <meta
      name="twitter:description"
      content="liaozk 的个人知识库与笔记：阅读、计算机、学习、生活记录与文章。"
    />

    <link rel="icon" type="image/jpeg" href="/liaozkwechat.jpg" />
    <link rel="apple-touch-icon" href="/liaozkwechat.jpg" />

    <!-- 规范链接：与线上最终域名一致时有利于去重（部署后修改） -->
    <link rel="canonical" href="https://liaozk.wiki/" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
