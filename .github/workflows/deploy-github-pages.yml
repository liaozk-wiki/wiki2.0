# 推送到 main 时：生成 content index → 构建 Vite → 部署到 GitHub Pages
name: Deploy to GitHub Pages 

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v6+ 与 GitHub 在 runner 上弃用 Node 20、默认 Node 24 的路线一致
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      # 默认：用户站 /；项目站 /仓库名/。若绑定自定义域名且站点在域名根，可在仓库 Settings → Variables 设 VITE_BASE=/
      - name: Set VITE_BASE for GitHub Pages
        run: |
          if [ -n "${{ vars.VITE_BASE }}" ]; then
            echo "VITE_BASE from repository variable"
            echo "VITE_BASE=${{ vars.VITE_BASE }}" >> "$GITHUB_ENV"
            exit 0
          fi
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE=/$REPO/" >> "$GITHUB_ENV"
          fi

      - run: npm ci
      - run: npm run content:index
      - run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
