# 推送到 main 时：生成 content index → 构建 Vite → 部署到 GitHub Pages
name: Deploy to GitHub Pages 

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v6+ 与 GitHub 在 runner 上弃用 Node 20、默认 Node 24 的路线一致
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      # 自定义域名（如 liaozk.wiki）下内容在域名根，资源应为 /assets/...，不能再用 /仓库名/assets/...
      # 优先读仓库 Variables 的 VITE_BASE；否则若 Pages API 有 cname 则用 /；否则按 github.io/仓库名 用 /仓库名/
      - name: Set VITE_BASE for GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ vars.VITE_BASE }}" ]; then
            echo "VITE_BASE from repository variable: ${{ vars.VITE_BASE }}"
            echo "VITE_BASE=${{ vars.VITE_BASE }}" >> "$GITHUB_ENV"
            exit 0
          fi
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "User Pages repo → VITE_BASE=/"
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
            exit 0
          fi
          CODE=$(curl -sS -o /tmp/gh_pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pages")
          if [ "$CODE" = "200" ]; then
            CNAME=$(jq -r '.cname // empty' /tmp/gh_pages.json)
            if [ -n "$CNAME" ]; then
              echo "Pages custom domain ($CNAME) → VITE_BASE=/"
              echo "VITE_BASE=/" >> "$GITHUB_ENV"
              exit 0
            fi
          else
            echo "GET /pages returned HTTP $CODE (using default subpath if applicable)"
          fi
          echo "Project default github.io/$REPO → VITE_BASE=/$REPO/"
          echo "VITE_BASE=/$REPO/" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run content:index
      - run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
